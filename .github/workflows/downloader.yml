name: 01 - Maked By Ai-YT-release

on:
  workflow_dispatch:
    inputs:
      video_urls:
        description: '🔗 لینک ویدیو ( چند لینک با فاصله )'
        required: true
        type: string
      download_subtitles:
        description: '📝 زیرنویس ( فارسی و انگلیسی )'
        required: false
        default: false
        type: boolean
      quality:
        description: '🎬 کیفیت و نوع'
        required: false
        default: 'best'
        type: choice
        options:
          - best
          - 2160
          - 1440
          - 1080
          - 720
          - 480
          - audio
      password:
        description: '🔒 رمز ( اختیاری برای محافظت )'
        required: false
        default: ''
        type: string

# ============ مهم: دسترسی‌های لازم برای ریلیز ============
permissions:
  contents: write
  # برای آپلود فایل در ریلیز نیاز است

jobs:
  get-video:
    name: "📥 دانلود ویدیو"
    runs-on: ubuntu-latest
    timeout-minutes: 180
    # این قسمت هم دسترسی را دوباره تأیید می‌کند
    permissions:
      contents: write

    steps:
      - name: Check URL provided
        run: |
          if [ -z "${{ github.event.inputs.video_urls }}" ]; then
            echo "❌ No video URL provided!"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git for Large Files
        run: |
          git config --global http.postBuffer 524288000
          git config --global http.maxRequestBuffer 100M
          git config --global core.compression 0
          git config --global pack.windowMemory 256m
          git config --global pack.packSizeLimit 100m
          git config --global pack.threads 1
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          echo "Git configured for large file handling"

      - name: Setup YouTube Cookies
        run: |
          if [ -n "${{ secrets.YT_COOKIES }}" ]; then
            echo "${{ secrets.YT_COOKIES }}" | base64 -d > cookies.txt 2>/dev/null || echo "${{ secrets.YT_COOKIES }}" > cookies.txt
            echo "✅ Cookies loaded from secrets"
          else
            echo "⚠️ No cookies found"
          fi

      - name: Start WARP Container
        run: |
          echo "Starting Cloudflare WARP container..."
          docker network create warp-net || true
          docker run -d \
            --name warp \
            --restart=always \
            --network warp-net \
            -p 1080:1080 \
            --cap-add NET_ADMIN \
            --sysctl net.ipv6.conf.all.disable_ipv6=0 \
            --sysctl net.ipv4.conf.all.src_valid_mark=1 \
            -v warp-data:/var/lib/cloudflare-warp \
            caomingjun/warp
          echo "Waiting for WARP to initialize (20 seconds)..."
          sleep 20
          echo "Checking WARP status..."
          for i in {1..8}; do
            RESULT=$(curl -s --max-time 5 --socks5-hostname 127.0.0.1:1080 https://cloudflare.com/cdn-cgi/trace 2>/dev/null || echo "failed")
            if echo "$RESULT" | grep -qE "warp=(on|plus)"; then
              echo "WARP is active!"
              echo "$RESULT"
              break
            else
              echo "Attempt $i/8 - WARP not ready yet, waiting..."
              sleep 5
            fi
          done

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip ffmpeg zip p7zip-full curl jq bc unzip
          curl -fsSL https://deno.land/install.sh | sh
          export DENO_INSTALL="$HOME/.deno"
          export PATH="$DENO_INSTALL/bin:$PATH"
          echo "$DENO_INSTALL/bin" >> $GITHUB_PATH
          deno --version
          pip3 install --upgrade yt-dlp

      - name: Download YouTube Video(s)
        env:
          YT_URLS: ${{ github.event.inputs.video_urls }}
          YT_QUALITY: ${{ github.event.inputs.quality }}
          YT_PASSWORD: ${{ github.event.inputs.password }}
          REPO_OWNER_ENV: ${{ github.repository_owner }}
          REPO_NAME_ENV: ${{ github.event.repository.name }}
          BRANCH_ENV: ${{ github.ref_name }}
        run: |
          chmod +x .github/scripts/download_yt.sh
          .github/scripts/download_yt.sh

      - name: Download Subtitles
        if: ${{ github.event.inputs.download_subtitles == 'true' }}
        run: |
          chmod +x .github/scripts/subtitles.sh
          .github/scripts/subtitles.sh

      - name: Stop WARP Container
        if: always()
        run: |
          docker stop warp || true
          docker rm warp || true

      # ============ قسمت جدید: آماده‌سازی فایل‌ها برای ریلیز ============
      
      - name: Prepare files for Release
        run: |
          echo "📦 Preparing files for GitHub Release..."
          
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          echo "Backup directory: $BACKUP_DIR"
          
          # ایجاد پوشه برای فایل‌های رلیز
          mkdir -p release_assets
          
          # کپی تمام فایل‌های ویدیویی به پوشه رلیز
          if [ -d "$BACKUP_DIR" ]; then
            for video_dir in "$BACKUP_DIR"/*/; do
              if [ -d "$video_dir" ]; then
                cp -r "$video_dir"/* release_assets/ 2>/dev/null || true
              fi
            done
            echo "✅ Files copied to release_assets/"
          else
            echo "⚠️ No backup directory found"
          fi
          
          # لیست فایل‌ها برای دیباگ
          echo "📋 Files to upload:"
          ls -la release_assets/ || echo "No files found"

      # ============ ساخت ریلیز در گیت‌هاب ============
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: "📹 Videos - Run #${{ github.run_number }}"
          tag_name: "videos-${{ github.run_number }}-${{ github.run_attempt }}"
          body: |
            ## 🎬 ویدیوهای دانلود شده
            
            | آیتم | مقدار |
            |------|-------|
            | **کیفیت** | `${{ github.event.inputs.quality }}` |
            | **زیرنویس** | `${{ github.event.inputs.download_subtitles }}` |
            | **تاریخ اجرا** | `${{ github.event.repository.updated_at }}` |
            
            ---
            
            ## 📥 راهنمای دانلود
            
            1. فایل‌های `*.z01`، `*.z02` و غیره را دانلود کنید
            2. فایل اصلی `*.zip` را دانلود کنید
            3. تمام فایل‌ها را در یک پوشه قرار دهید
            4. فایل `*.zip` را Extract کنید
            
            > **توجه:** اگر رمز عبور تنظیم شده باشد، هنگام Extract از آن استفاده کنید.
            
            ---
            *Created by [AVASAM](https://avasam.ir)*
          files: |
            release_assets/*
          token: ${{ secrets.GITHUB_TOKEN }}
          # توجه: پارامتر make_latest حذف شد چون پشتیبانی نمی‌شود

      # ============ پاکسازی فایل‌های موقت قدیمی (اختیاری) ============
      
      - name: Cleanup old releases (keep last 10)
        if: always()
        run: |
          echo "🧹 Cleaning up old releases..."
          # لیست رلیزها و حذف رلیزهای قدیمی (به جز 10 تای آخر)
          gh release list --limit 50 --json tagName --jq '.[].tagName' | while read tag; do
            if [[ "$tag" == videos-* ]]; then
              # شمارش رلیزهای ویدیویی
              COUNT=$(gh release list --limit 100 | grep -c "videos-" || echo "0")
              if [ "$COUNT" -gt 10 ]; then
                echo "Deleting old release: $tag"
                gh release delete "$tag" --yes || true
              fi
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
